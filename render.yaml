services:
  - type: web
    name: isker-app
    runtime: node
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: DATABASE_URL
        fromDatabase:
          name: isker-db
          property: connectionString

databases:
  - name: isker
    databaseName: isker
    plan: free